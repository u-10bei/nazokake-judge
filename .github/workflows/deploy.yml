name: deploy

# 本実装 Worker を Cloudflare へデプロイする（CI 経由, F-3）。
# smoke-test-deploy.yml を雛形に流用。手動実行 + main への push（任意で有効化）。
on:
  workflow_dispatch:
  # push:
  #   branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}       # Workers Scripts:Edit + D1:Edit
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run tests (unit + PBT)
        env:
          HYPOTHESIS_PROFILE: ci
        run: uv run --group dev pytest -q

      - name: Apply D1 migrations (remote)
        run: uv run pywrangler d1 migrations apply nazokake-judge --remote

      - name: Deploy worker
        run: uv run pywrangler deploy
