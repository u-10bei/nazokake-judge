# nazokake-judge smoke test (使い捨て。本実装の wrangler.toml は Code Generation で別途作成)
name = "nazokake-smoke"
main = "src/entry.py"
compatibility_date = "2025-06-01"
compatibility_flags = ["python_workers"]

# D1: `npx wrangler d1 create nazokake-smoke` の出力で database_id を置き換えること
[[d1_databases]]
binding = "DB"
database_name = "nazokake-smoke"
database_id = "115db1e2-c906-49c0-89df-25cfcd58eb5d"
migrations_dir = "migrations"
